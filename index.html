<style>
  :root {

  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

  .hdr{background:linear-gradient(135deg,var(--db),var(--dbd));color:#fff;position:sticky;top:0;z-index:100;box-shadow:0 8px 30px rgba(12,59,111,.12)}

  .hdr-logo{width:38px;height:38px;background:var(--lima);border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'IBM Plex Mono',monospace;font-weight:700;font-size:18px;color:#fff;flex-shrink:0}

  .hdr-sub{font-size:13px;opacity:.7}
  .sc{text-align:center;font-size:12px;opacity:.7;padding:8px 24px 10px;font-family:'IBM Plex Mono',monospace;max-width:800px;margin:0 auto}

  .pb{background:rgba(255,255,255,.15);height:4px;width:100%}
  .pf{height:100%;background:var(--lima);border-radius:0 2px 2px 0;transition:width .4s}

  .ct{max-width:800px;margin:0 auto;padding:24px 24px 100px}
  .sn{font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:500;color:var(--lima);text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px}
  .st{font-size:24px;font-weight:700;color:var(--db);letter-spacing:-.03em;margin-bottom:8px}
  .sd{color:var(--txs);font-size:14px;margin-bottom:20px}

  .ql{display:block;font-size:15px;font-weight:600;margin-bottom:4px;line-height:1.5}
  .ql .qn{color:var(--db);font-family:'IBM Plex Mono',monospace;font-size:13px;margin-right:6px}
  .rq{color:var(--err);margin-left:2px}
  .qh{font-size:13px;color:var(--txm);margin-bottom:14px;font-style:italic}
  .em{font-size:12px;color:var(--err);margin-top:8px;display:none}

  input[type=text],textarea{width:100%;padding:10px 14px;border:1.5px solid var(--bdr);border-radius:var(--rs);font-family:'DM Sans',sans-serif;font-size:14px;color:var(--txt);background:var(--bg);outline:none}

  .os{display:flex;flex-direction:column;gap:8px}

  .op:hover{border-color:var(--db);background:#F0F4FA}
  .op.s{border-color:var(--db);background:#EBF0FA}

  .op.s .cr{border-color:var(--db)}
  .op.s .cr::after{content:"";width:10px;height:10px;background:var(--db);border-radius:50%}
  .op.s .cc{border-color:var(--db);background:var(--db)}

  .so.s{border-color:var(--db);background:#EBF0FA}

  .sn2{width:28px;height:28px;border-radius:50%;background:var(--bdr);display:flex;align-items:center;justify-content:center;font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:13px;color:var(--txs);flex-shrink:0;transition:all .2s}

  .stx{font-size:13.5px;color:var(--txs)}

  .nb{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--bdr);padding:14px 24px;z-index:100;box-shadow:0 -4px 16px rgba(0,0,0,.06)}
  .ni{max-width:800px;margin:0 auto;display:flex;justify-content:space-between;align-items:center}
  .bt{padding:11px 28px;border-radius:var(--rs);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;border:none;display:inline-flex;align-items:center;gap:8px}
  .bp{background:var(--db);color:#fff} .bp:hover{background:var(--dbl)}
  .bs{background:transparent;color:var(--txs);border:1.5px solid var(--bdr)} .bs:hover{border-color:var(--db);color:var(--db)}
  .bk{background:var(--lima);color:#fff;padding:13px 36px;font-size:15px} .bk:hover{background:var(--limad)}

  .ic{background:#fff;border-radius:var(--r);padding:32px;box-shadow:0 4px 12px rgba(12,59,111,.08);border:1px solid var(--bdr);text-align:center;margin-bottom:20px}
  .ii{width:64px;height:64px;background:linear-gradient(135deg,var(--db),var(--dbl));border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 20px}

  .ic p{color:var(--txs);font-size:14.5px;line-height:1.7;max-width:560px;margin:0 auto 16px}
  .is{display:flex;justify-content:center;gap:32px;margin-top:24px;padding-top:20px;border-top:1px solid var(--bdr)}
  .isn{font-family:'IBM Plex Mono',monospace;font-size:28px;font-weight:700;color:var(--db)}
  .isl{font-size:12px;color:var(--txm);text-transform:uppercase;letter-spacing:.05em}

  .si{width:80px;height:80px;background:var(--okbg);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:60px auto 24px}
  .si svg{width:40px;height:40px;color:var(--ok)}

  .lo{position:fixed;inset:0;background:rgba(255,255,255,.9);z-index:1000;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px}
  .sp{width:40px;height:40px;border:3px solid var(--bdr);border-top-color:var(--db);border-radius:50%;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

  @media(max-width:640px){
    .hdr-in{padding:16px 16px 8px} .ct{padding:16px 16px 100px} .qc{padding:18px 16px}
    .st{font-size:20px} .ic{padding:24px 16px} .bt{padding:10px 20px;font-size:13px}
  }
</style>

role de contratos de aluguel","Prestação de contas Espresso","Relatórios gerenciais","Atendimento ao escritório contábil","Controle de PRODEIC (FUNDEIC/FUNDED)","Arquivo de documentos","Nenhuma dessas"],1,"Marque TODAS que se aplicam")+A("q2_5_outras_livre","2.5","Atividade que NÃO apareceu nas listas acima?",0,"Descreva tudo, mesmo que pareça menor.");

  if(i===6) return '<div class="sn">Seção 06</div><div class="st">Comunicação e Interfaces</div><div class="sd">Como o financeiro se conecta com outras áreas.</div>'+C("q6_1_interfaces","6.1","Áreas de FORA do financeiro que mais interage",["Compras","Comercial/Vendas","Fiscal/Tributário","RH/DP","Operação/Técnicos","Diretoria/Sócios","Escritório contábil","Bancos","Fornecedores","Clientes","TI/Suporte"],1)+A("q6_2_gargalos","6.2","A comunicação funciona bem ou gera problemas?",1,"Descreva os principais gargalos")+A("q6_3_contabilidade","6.3","Quando a contabilidade pede informações, como recebe e em quanto tempo responde?",0);

  if(i===7) return '<div class="sn">Seção 07</div><div class="st">Fechamento Mensal e Prazos</div><div class="sd">Dinâmica dos seus prazos e fechamento.</div>'+R("q7_1_prazos","7.1","Sabe quais são seus prazos de fechamento?",["Sim, prazos claros e definidos","Ideia geral, não formalizado","Não tenho prazos definidos"],1)+A("q7_2_rotina_semanal","7.2","Como é sua rotina semanal típica?",1,"Ex: 'Segunda: concilio bancos. Terça: programo pagamentos...'")+R("q7_3_carga_fechamento","7.3","Na primeira semana do mês, sua carga:",["Aumenta muito - fico sobrecarregada","Aumenta um pouco","É igual ao resto do mês","Diminui (maior carga no meio/fim)"],1);

  if(i===8) return '<div class="sn">Seção 08</div><div class="st">Desenvolvimento e Expectativas</div><div class="sd">Onde você quer crescer e como podemos ajudar.</div>'+C("q8_1_desenvolvimento","8.1","Áreas que gostaria de se desenvolver",["Excel/planilhas avançadas","Domínio do Sankhya","Análise financeira e indicadores","Fluxo de caixa e projeções","Conciliação bancária avançada","Análise de crédito e cobrança","Controladoria e relatórios gerenciais","Gestão de processos"],1,"Marque até 3",3)+R("q8_2_foco","8.2","Se reestruturada, qual área gostaria de atuar?",["Contas a Pagar e Tesouraria","Contas a Receber e Cobrança","Conciliação e Controles","Sem preferência - onde precisar"],1)+A("q8_3_livre","8.3","Espaço aberto: algo mais?",0,"Sobre rotina, dificuldades, sugestões - tudo será levado em conta.")+'<div class="ib" style="margin-top:24px"><strong>Obrigado pela colaboração!</strong> Suas respostas são fundamentais para o projeto.</div>';

}

// ---- Save current section data ----
function save(){
  var box=document.getElementById("box");
  var txts=box.querySelectorAll("input[type=text],textarea");
  for(var i=0;i<txts.length;i++){if(txts[i].name)allData[txts[i].name]=txts[i].value.trim();}
  var rads=box.querySelectorAll("input[type=radio]:checked");
  for(var i=0;i<rads.length;i++){allData[rads[i].name]=rads[i].value;}
  var cg={};
  var chks=box.querySelectorAll("input[type=checkbox]:checked");
  for(var i=0;i<chks.length;i++){if(!cg[chks[i].name])cg[chks[i].name]=[];cg[chks[i].name].push(chks[i].value);}
  for(var k in cg){allData[k]=cg[k].join("; ");}
}

// ---- Restore saved data ----
function restore(){
  var box=document.getElementById("box");
  var txts=box.querySelectorAll("input[type=text],textarea");
  for(var i=0;i<txts.length;i++){if(txts[i].name&&allData[txts[i].name])txts[i].value=allData[txts[i].name];}
  var rads=box.querySelectorAll("input[type=radio]");
  for(var i=0;i<rads.length;i++){if(allData[rads[i].name]===rads[i].value){rads[i].checked=true;var p=rads[i].closest(".op,.so");if(p)p.classList.add("s");}}
  var chks=box.querySelectorAll("input[type=checkbox]");
  for(var i=0;i<chks.length;i++){var sv=allData[chks[i].name]||"";if(sv.split("; ").indexOf(chks[i].value)!==-1){chks[i].checked=true;var p=chks[i].closest(".op");if(p)p.classList.add("s");}}
}

// ---- Validate ----
function validate(){
  if(cur===0)return true;
  var ok=true;
  var cards=document.querySelectorAll("#box .qc[data-rq]");
  for(var c=0;c<cards.length;c++){
    var card=cards[c];
    var has=false;
    var ti=card.querySelector("input[type=text]");
    var ta=card.querySelector("textarea");
    var ra=card.querySelectorAll("input[type=radio]");
    var ch=card.querySelectorAll("input[type=checkbox]");
    if(ti&&!ra.length&&!ch.length)has=ti.value.trim().length>0;
    if(ta)has=ta.value.trim().length>0;
    if(ra.length){for(var r=0;r<ra.length;r++){if(ra[r].checked){has=true;break;}}}
    if(ch.length){for(var x=0;x<ch.length;x++){if(ch[x].checked){has=true;break;}}}
    var em=card.querySelector(".em");
    if(!has){ok=false;card.classList.add("er");if(em)em.classList.add("on");}
    else{card.classList.remove("er");if(em)em.classList.remove("on");}
  }
  if(!ok){var fe=document.querySelector("#box .qc.er");if(fe)fe.scrollIntoView({behavior:"smooth",block:"center"});}
  return ok;
}

// ---- Render ----
function render(){
  document.getElementById("box").innerHTML=getSec(cur);

  // Progress
  var ps=document.getElementById("ps");ps.innerHTML="";
  for(var i=0;i<TOT;i++){var d=document.createElement("div");if(i<cur)d.className="d";if(i===cur)d.className="n";ps.appendChild(d);}
  document.getElementById("pf").style.width=(cur/(TOT-1)*100)+"%";
  document.getElementById("sc").textContent=cur===0?"Introdução":"Seção "+cur+" de 8";

  // Buttons
  document.getElementById("bp").style.visibility=cur===0?"hidden":"visible";
  if(cur===TOT-1){document.getElementById("bn").style.display="none";document.getElementById("bx").style.display="inline-flex";}
  else{document.getElementById("bn").style.display="inline-flex";document.getElementById("bx").style.display="none";document.getElementById("bn").innerHTML=cur===0?"Começar &#8250;":"Próxima &#8250;";}

  restore();
  window.scrollTo(0,0);
}

// ---- Navigate ----
function go(dir){
  save();
  if(dir>0&&!validate())return;
  var next=cur+dir;
  if(next<0||next>=TOT)return;
  cur=next;
  render();
}

// ---- Click handlers (event delegation) ----
document.addEventListener("click",function(e){
  var op=e.target.closest(".op");
  if(op){
    e.preventDefault();
    var inp=op.querySelector("input");
    if(!inp)return;

    if(inp.type==="radio"){
      var container=op.closest(".os")||op.parentElement;
      var all=container.querySelectorAll(".op");
      for(var i=0;i<all.length;i++)all[i].classList.remove("s");
      op.classList.add("s");
      inp.checked=true;
    }else if(inp.type==="checkbox"){
      var card=op.closest(".qc");
      var mx=card?parseInt(card.getAttribute("data-mx")||"999"):999;
      if(!inp.checked){
        var cnt=op.closest(".os").querySelectorAll("input:checked").length;
        if(cnt>=mx)return;
      }
      inp.checked=!inp.checked;
      if(inp.checked)op.classList.add("s");else op.classList.remove("s");

      // Nenhuma dessas
      var os=op.closest(".os");
      if(inp.value.indexOf("Nenhuma")===0&&inp.checked){
        var all=os.querySelectorAll("input[type=checkbox]");
        for(var i=0;i<all.length;i++){if(all[i]!==inp){all[i].checked=false;all[i].closest(".op").classList.remove("s");}}
      }else if(inp.value.indexOf("Nenhuma")!==0&&inp.checked){
        var nn=os.querySelector('input[value^="Nenhuma"]');
        if(nn){nn.checked=false;nn.closest(".op").classList.remove("s");}
      }
    }
    // Clear error
    var qc=op.closest(".qc");
    if(qc){qc.classList.remove("er");var em=qc.querySelector(".em");if(em)em.classList.remove("on");}
    return;
  }

  var so=e.target.closest(".so");
  if(so){
    e.preventDefault();
    var inp=so.querySelector("input");
    var all=so.parentElement.querySelectorAll(".so");
    for(var i=0;i<all.length;i++)all[i].classList.remove("s");
    so.classList.add("s");
    inp.checked=true;
    var qc=so.closest(".qc");
    if(qc){qc.classList.remove("er");var em=qc.querySelector(".em");if(em)em.classList.remove("on");}
  }
});

// Clear errors on typing
document.addEventListener("input",function(e){
  if(e.target.matches("input[type=text],textarea")){
    if(e.target.value.trim()){var qc=e.target.closest(".qc");if(qc){qc.classList.remove("er");var em=qc.querySelector(".em");if(em)em.classList.remove("on");}}
  }
});

// ---- Submit ----
function doSubmit(){
  save();
  if(!validate())return;
  if(SHEETS_URL==="https://script.google.com/macros/s/AKfycbxKA0AWtD_PpL-J8tI-noUL03vTP0HxaUJEaqyQTdpgp-RFl7VBwECPnPO6oKPKyTnr/exec"){alert("Configure a URL do Google Apps Script antes de enviar.\n\nVeja as instruções no arquivo INSTRUCOES_GOOGLE_SHEETS.md");return;}
  document.getElementById("lo").style.display="flex";
  allData.timestamp=new Date().toISOString();
  fetch(SHEETS_URL,{method:"POST",mode:"no-cors",headers:{"Content-Type":"application/json"},body:JSON.stringify(allData)}).then(function(){
    document.getElementById("lo").style.display="none";
    document.getElementById("nav").style.display="none";
    document.getElementById("hdr").style.display="none";
    document.getElementById("box").innerHTML='<div style="text-align:center;padding:60px 0"><div class="si"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg></div><h2 style="font-size:24px;margin-bottom:12px">Questionário enviado com sucesso!</h2><p style="color:var(--txs);font-size:15px;max-width:480px;margin:0 auto;line-height:1.7">Obrigado por dedicar seu tempo. Suas informações serão fundamentais para o projeto de reestruturação.</p></div>';
  }).catch(function(){
    document.getElementById("lo").style.display="none";
    alert("Erro ao enviar. Verifique sua conexão e tente novamente.");
  });
}

// ---- Init ----
render();
</script>
